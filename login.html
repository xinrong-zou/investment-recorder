<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 上岸鸽</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #f0f4ff, #e8f0fe);
    }
    .auth-box { width: 100%; max-width: 400px; }
    .auth-header { text-align: center; margin-bottom: 28px; }
    .auth-header .logo {
      width: 48px; height: 48px;
      background: var(--primary); border-radius: 12px;
      display: inline-flex; align-items: center; justify-content: center;
      color: white; font-size: 1.4rem; margin-bottom: 12px;
    }
    .auth-header h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .auth-header p { color: var(--text-muted); font-size: 0.9rem; }
    .auth-card { padding: 32px; }
    .auth-footer { text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 0.9rem; }
    .auth-footer a { color: var(--primary-light); font-weight: 600; }
    .back-link {
      display: inline-flex; align-items: center; gap: 4px;
      color: var(--text-muted); font-size: 0.85rem;
      margin-top: 20px; text-align: center; width: 100%; justify-content: center;
    }
    .back-link:hover { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-header">
        <a href="index.html" class="logo">🕊</a>
        <h1>欢迎回来</h1>
        <p>登录你的上岸鸽账号</p>
      </div>

      <div class="auth-card card">
        <div id="message" class="alert"></div>

        <form id="loginForm">
          <div class="input-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" class="input" placeholder="your@email.com" required autocomplete="email">
          </div>
          <div class="input-group">
            <label for="password">密码</label>
            <input type="password" id="password" class="input" placeholder="请输入密码" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">登录</button>
        </form>
      </div>

      <div class="auth-footer">
        还没有账号？<a href="register.html">免费注册</a>
      </div>
      <a href="index.html" class="back-link">← 返回首页</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      const SUPABASE_URL = 'https://spb-cl9n18iof0i9qxjh.supabase.opentrust.net';
      const SUPABASE_ANON_KEY = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJyb2xlIjoiYW5vbiIsInJlZiI6InNwYi1jbDluMThpb2YwaTlxeGpoIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3ODA2NjgzNzQsImV4cCI6MjA5NjI0NDM3NH0.t8MDF4zdvV9kpUz-gZpVM-OgFlAow8FlENASpqkUkwk';
      const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const form = document.getElementById('loginForm');
      const msg = document.getElementById('message');
      const btn = document.getElementById('submitBtn');

      function showMsg(text, type) {
        msg.textContent = text;
        msg.className = 'alert alert-' + type;
      }

      // 检查是否已登录
      client.auth.getSession().then(({ data: { session } }) => {
        if (session) {
          showMsg('您已登录，正在跳转到看板...', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
        }
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        btn.disabled = true;
        btn.textContent = '登录中...';

        const { data, error } = await client.auth.signInWithPassword({
          email: email, password: password
        });

        btn.disabled = false;
        btn.textContent = '登录';

        if (error) {
          showMsg(error.message, 'error');
        } else {
          showMsg('登录成功，正在跳转...', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
        }
      });
    })();
  </script>

</html>
