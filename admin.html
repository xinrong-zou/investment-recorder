<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 - 收益账本</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-layout { display: flex; min-height: calc(100vh - 56px); }
    .admin-sidebar { width: 200px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 16px; flex-shrink: 0; }
    .admin-sidebar h3 { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; letter-spacing: 0.5px; }
    .admin-sidebar .nav-item { display: block; padding: 8px 12px; border-radius: var(--radius-sm); color: var(--text-secondary); font-size: 0.88rem; cursor: pointer; transition: all 0.15s; margin-bottom: 2px; text-decoration: none; }
    .admin-sidebar .nav-item:hover { background: var(--bg-hover); color: var(--text); }
    .admin-sidebar .nav-item.active { background: var(--primary-bg); color: var(--primary); font-weight: 600; }
    .admin-main { flex: 1; padding: 20px; max-width: 100%; overflow-y: auto; }
    .admin-main h1 { font-size: 1.3rem; margin-bottom: 16px; }
    .admin-main h2 { font-size: 1.1rem; margin-bottom: 12px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { padding: 16px; text-align: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .stat-card .num { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
    .stat-card .label { font-size: 0.82rem; color: var(--text-muted); margin-top: 4px; }
    table.admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    table.admin-table th { text-align: left; padding: 10px 12px; background: var(--bg-hover); color: var(--text-muted); font-weight: 600; font-size: 0.78rem; border-bottom: 2px solid var(--border); }
    table.admin-table td { padding: 8px 12px; border-bottom: 1px solid var(--border-light); color: var(--text-secondary); }
    table.admin-table tr:hover td { background: var(--bg-hover); }
    .login-required { text-align: center; padding: 80px 20px; }
    .login-required h2 { margin-bottom: 8px; }
    .login-required p { color: var(--text-muted); margin-bottom: 20px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    @media (max-width: 768px) {
      .admin-layout { flex-direction: column; }
      .admin-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); display: flex; gap: 4px; overflow-x: auto; padding: 10px 16px; }
      .admin-sidebar .nav-item { white-space: nowrap; flex-shrink: 0; font-size: 0.82rem; }
      .admin-main h1 { font-size: 1.1rem; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-card .num { font-size: 1.4rem; }
      table.admin-table { font-size: 0.78rem; }
      table.admin-table th, table.admin-table td { padding: 6px 8px; }
    }
  </style>
</head>
<body>
<div id="nav-app"><nav-bar></nav-bar></div>

<div id="loginPrompt" class="login-required" style="display:none;">
  <h2>🔐 需要管理员权限</h2>
  <p>请使用管理员账号登录后访问此页面</p>
  <a href="login.html" class="btn btn-primary">去登录</a>
</div>

<div id="notAdmin" class="login-required" style="display:none;">
  <h2>⛔ 权限不足</h2>
  <p>当前账号不是管理员</p>
  <a href="/" class="btn btn-primary">返回看板</a>
</div>

<div id="adminPanel" class="admin-layout" style="display:none;">
  <aside class="admin-sidebar">
    <div class="sidebar-section">
      <h3>管理</h3>
      <a class="nav-item active" data-tab="overview" onclick="switchTab('overview')">📊 概览</a>
      <a class="nav-item" data-tab="users" onclick="switchTab('users');loadUsers()">👥 用户管理</a>
      <a class="nav-item" data-tab="subscriptions" onclick="switchTab('subscriptions');loadSubscriptions()">🎗️ 赞助管理</a>
      <a class="nav-item" data-tab="feedbacks" onclick="switchTab('feedbacks');loadAdminFeedbacks()">💬 反馈管理</a>
      <a class="nav-item" data-tab="settings" onclick="switchTab('settings')">⚙️ 设置</a>
    </div>
  </aside>
  <main class="admin-main">
    <!-- 概览 -->
    <div class="tab-content active" id="tab-overview">
      <h1>📊 概览</h1>
      <div class="stat-grid" id="statsGrid">加载中...</div>
    </div>

    <!-- 用户管理 -->
    <div class="tab-content" id="tab-users">
      <h1>👥 用户管理</h1>
      <div style="overflow-x:auto;">
        <table class="admin-table">
          <thead><tr>
            <th>邮箱</th><th>注册时间</th><th>账户数</th><th>总记录数</th><th>状态</th><th>角色</th>
          </tr></thead>
          <tbody id="adminUserList"></tbody>
        </table>
      </div>
      <div id="adminUsersLoading" style="text-align:center;padding:40px;color:var(--text-muted);">加载中...</div>
    </div>

    <!-- 会员管理 -->
    <div class="tab-content" id="tab-subscriptions">
      <h1>⭐ 会员管理</h1>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px;">管理用户的赞助状态，仅管理员可操作</p>
      <div style="overflow-x:auto;">
        <table class="admin-table">
          <thead><tr>
            <th>邮箱</th><th>注册时间</th><th>赞助状态</th><th>到期时间</th><th>操作</th>
          </tr></thead>
          <tbody id="subMgmtList"></tbody>
        </table>
      </div>
      <div id="subMgmtLoading" style="text-align:center;padding:40px;color:var(--text-muted);">加载中...</div>
      <div id="subMgmtResult" style="display:none;margin-top:12px;padding:12px;border-radius:var(--radius-sm);font-size:0.85rem;"></div>
    </div>

    <!-- 反馈管理 -->
    <div class="tab-content" id="tab-feedbacks">
      <h1>💬 反馈管理</h1>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px;">用户提交的反馈，可回复</p>
      <div style="overflow-x:auto;">
        <table class="admin-table">
          <thead><tr>
            <th>时间</th><th>用户</th><th>类型</th><th>内容</th><th>回复</th><th>操作</th>
          </tr></thead>
          <tbody id="adminFeedbackList"></tbody>
        </table>
      </div>
      <div id="feedbackLoading" style="text-align:center;padding:40px;color:var(--text-muted);">加载中...</div>
    </div>

    <!-- 设置 -->
    <div class="tab-content" id="tab-settings">
      <h1>⚙️ 设置</h1>
      <div class="card" style="padding:24px;max-width:500px;">
        <h2 style="margin-bottom:12px;">管理员账号</h2>
        <p style="font-size:0.88rem;color:var(--text-secondary);margin-bottom:16px;">
          当前管理员: <strong id="adminEmail">—</strong>
        </p>
      </div>
    </div>
  </main>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="nav-bar.js"></script>
<script>
(function() {
  const SUPABASE_URL = 'https://spb-cl9n18iof0i9qxjh.supabase.opentrust.net';
  const SUPABASE_ANON_KEY = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJyb2xlIjoiYW5vbiIsInJlZiI6InNwYi1jbDluMThpb2YwaTlxeGpoIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3ODA2NjgzNzQsImV4cCI6MjA5NjI0NDM3NH0.t8MDF4zdvV9kpUz-gZpVM-OgFlAow8FlENASpqkUkwk';
  const client = window.__supabaseClient || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  if (!window.__supabaseClient) window.__supabaseClient = client;
  const ADMIN_EMAILS = []; // 管理员验证由Worker通过auth/v1/user完成
  let currentUser = null;

  mountNavBar('#nav-app');

  window.switchTab = function(name) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.querySelector('[data-tab="' + name + '"]').classList.add('active');
  };

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  async function init() {
    const { data: { session } } = await client.auth.getSession();
    if (!session) {
      document.getElementById('loginPrompt').style.display = 'block';
      return;
    }
    currentUser = session.user;
    const email = currentUser.email || '';
    document.getElementById('adminEmail').textContent = email;

    // 通过Worker验证管理员身份（auth/v1/user验签）
    try {
      const testReq = await fetch((window.__API_BASE||'') + '/api/admin/users', {
        headers: { 'Authorization': 'Bearer ' + session.access_token }
      });
      if (!testReq.ok) throw new Error('not admin');
      const testData = await testReq.json();
      if (!testData.users) throw new Error('not admin');
    } catch(e) {
      document.getElementById('notAdmin').style.display = 'block';
      return;
    }
    document.getElementById('adminPanel').style.display = 'flex';
    await loadStats();
  }

  async function loadStats() {
    // 查询各表计数
    let accountCount = 0, recordCount = 0, userCount = 0;
    try {
      const { count: ac } = await client.from('investment_accounts').select('*', { count: 'exact', head: true });
      accountCount = ac || 0;
    } catch(e) {}
    try {
      const { count: rc } = await client.from('investment_records').select('*', { count: 'exact', head: true });
      recordCount = rc || 0;
    } catch(e) {}
    // 用户数通过 distinct user_id 估算
    try {
      const { data: ud } = await client.from('investment_accounts').select('user_id');
      if(ud) userCount = new Set(ud.map(a=>a.user_id)).size;
    } catch(e) {}

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="num">${userCount}</div><div class="label">总用户</div></div>
      <div class="stat-card"><div class="num">${accountCount}</div><div class="label">总账户</div></div>
      <div class="stat-card"><div class="num">${recordCount}</div><div class="label">总记录</div></div>
      <div class="stat-card"><div class="num">${accountCount ? (recordCount / accountCount).toFixed(1) : 0}</div><div class="label">平均记录/账户</div></div>
    `;
  }

  window.loadUsers = async function() {
    document.getElementById('adminUsersLoading').style.display = 'block';
    try {
      const session = (await client.auth.getSession()).data.session;
      if (!session) throw new Error('未登录');
      const adminEmail = session.user?.email || '';

      // 先尝试 Worker 接口
      let users = null;
      try {
        const req = await fetch((window.__API_BASE||'') + '/api/admin/users', {
          headers: { 'Authorization': 'Bearer ' + session.access_token }
        });
        if (req.ok) {
          const data = await req.json();
          if (data.users) users = data.users;
        }
      } catch(e) { /* Worker 失败则降级 */ }

      if (!users) {
        // 降级：从 investment_accounts 汇总
        const { data: accts } = await client.from('investment_accounts').select('user_id');
        const userIds = [...new Set((accts||[]).map(a => a.user_id))];
        users = userIds.map(id => ({ id, email: null, created_at: null, plan: 'free' }));
      }

      // 统计各用户账户数和记录数
      const { data: accts2 } = await client.from('investment_accounts').select('id,user_id');
      const uidByAcct = {};
      const acctCountByUser = {};
      (accts2||[]).forEach(a => { uidByAcct[a.id] = a.user_id; acctCountByUser[a.user_id] = (acctCountByUser[a.user_id]||0) + 1; });
      const { data: recs } = await client.from('investment_records').select('account_id');
      const recCountByUser = {};
      (recs||[]).forEach(r => { const uid = uidByAcct[r.account_id]; if(uid) recCountByUser[uid] = (recCountByUser[uid]||0) + 1; });

      const list = document.getElementById('adminUserList');
      list.innerHTML = users.sort((a,b) => (recCountByUser[b.id]||0) - (recCountByUser[a.id]||0)).map(u => `
        <tr>
          <td>${escapeHtml(u.email||u.id.substring(0,12)+'...'||'?')}</td>
          <td>${u.created_at ? u.created_at.substring(0,10) : '—'}</td>
          <td>${acctCountByUser[u.id]||0}</td>
          <td>${recCountByUser[u.id]||0}</td>
          <td>${u.plan==='pro'?'<span style="display:inline-block;padding:1px 8px;border-radius:10px;font-size:0.72rem;font-weight:500;background:#fef3c7;color:#d97706;">已赞助</span>':'<span style="color:var(--text-muted);font-size:0.78rem;">—</span>'}</td>
          <td>${u.email === currentUser?.email ? '<span style="color:var(--primary);font-weight:600;">管理员</span>' : '用户'}</td>
        </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);">暂无数据</td></tr>';
    } catch(e) {
      document.getElementById('adminUserList').innerHTML = '<tr><td colspan="6" style="color:var(--text-muted);text-align:center;">加载失败: ' + e.message + '</td></tr>';
    }
    document.getElementById('adminUsersLoading').style.display = 'none';
  };

  // ====== 会员管理 ======
  window.loadSubscriptions = async function() {
    document.getElementById('subMgmtLoading').style.display = 'block';
    document.getElementById('subMgmtResult').style.display = 'none';
    try {
      const session = (await client.auth.getSession()).data.session;
      if (!session) throw new Error('未登录');
      const req = await fetch((window.__API_BASE||'') + '/api/admin/users', {
        headers: { 'Authorization': 'Bearer ' + session.access_token }
      });
      if (!req.ok) throw new Error('请求失败');
      const data = await req.json();
      const users = data.users || [];
      const list = document.getElementById('subMgmtList');
      list.innerHTML = users.map(u => {
        const isPro = u.plan === 'pro';
        const expires = u.expires_at ? new Date(u.expires_at).toLocaleDateString('zh-CN') : '—';
        const notExpired = isPro && (!u.expires_at || new Date(u.expires_at) > new Date());
        const planTag = notExpired
          ? '<span style="display:inline-block;padding:1px 8px;border-radius:10px;font-size:0.72rem;font-weight:500;background:#fef3c7;color:#d97706;">已赞助</span>'
          : isPro
            ? '<span style="display:inline-block;padding:1px 8px;border-radius:10px;font-size:0.72rem;font-weight:500;background:#f3f4f6;color:#9ca3af;">已过期</span>'
            : '<span style="color:var(--text-muted);font-size:0.78rem;">free</span>';
        const actionBtn = isPro
          ? `<button class="btn btn-ghost btn-sm" onclick="setSubscription('${u.email}','revoke')">取消赞助</button>`
          : `<button class="btn btn-primary btn-sm" onclick="setSubscription('${u.email}','grant')">设为赞助</button>`;
        return `<tr>
          <td>${escapeHtml(u.email||'?')}</td>
          <td>${(u.created_at||'').substring(0,10)}</td>
          <td>${planTag}</td>
          <td style="font-size:0.82rem;color:var(--text-muted);">${expires}</td>
          <td class="admin-actions">${actionBtn}</td>
        </tr>`;
      }).join('');
    } catch(e) {
      document.getElementById('subMgmtList').innerHTML = `<tr><td colspan="5" style="color:var(--text-muted);text-align:center;">加载失败: ${e.message}</td></tr>`;
    }
    document.getElementById('subMgmtLoading').style.display = 'none';
  };

  window.setSubscription = async function(email, action) {
    const resultDiv = document.getElementById('subMgmtResult');
    resultDiv.style.display = 'block';
    resultDiv.textContent = action === 'grant' ? '正在设为赞助 ' + email + ' Pro...' : '正在取消赞助 ' + email + ' Pro...';
    try {
      const session = (await client.auth.getSession()).data.session;
      if (!session) throw new Error('未登录');
      const req = await fetch((window.__API_BASE||'') + '/api/admin/subscription', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + session.access_token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, action, months: 1 })
      });
      const data = await req.json();
      if (data.ok) {
        resultDiv.style.background = '#d4edda'; resultDiv.style.color = '#155724';
        resultDiv.textContent = '✅ ' + email + ' → ' + (data.plan === 'pro' ? '赞助已生效!' : '已取消赞助');
        loadSubscriptions();
      } else {
        throw new Error(data.error || '操作失败');
      }
    } catch(e) {
      resultDiv.style.background = '#f8d7da'; resultDiv.style.color = '#721c24';
      resultDiv.textContent = '❌ 操作失败: ' + e.message;
    }
  };

  // ====== 反馈管理 ======
  window.loadAdminFeedbacks = async function() {
    document.getElementById('feedbackLoading').style.display = 'block';
    try {
      const { data, error } = await client
        .from('feedbacks')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) throw error;
      const list = document.getElementById('adminFeedbackList');
      list.innerHTML = (data || []).map(f => `
        <tr>
          <td style="font-size:0.78rem;color:var(--text-muted);">${(f.created_at||'').substring(0,16)}</td>
          <td style="font-size:0.82rem;">${escapeHtml((f.user_email||f.user_id||'').substring(0,24))}</td>
          <td><span class="tag ${f.type==='bug'?'tag-in':f.type==='feature'?'tag-out':'tag-revalue'}">${f.type==='bug'?'问题':f.type==='feature'?'建议':'其他'}</span></td>
          <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(f.content)}</td>
          <td style="font-size:0.82rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(f.reply||'')||'<span style="color:var(--text-muted);">—</span>'}</td>
          <td class="admin-actions">
            ${!f.reply ? `<button class="btn btn-ghost btn-sm" onclick="replyFeedback('${f.id}')">回复</button>` : ''}
          </td>
        </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);">暂无反馈</td></tr>';
    } catch(e) {
      document.getElementById('adminFeedbackList').innerHTML = '<tr><td colspan="6" style="color:var(--text-muted);text-align:center;">加载失败: ' + e.message + '</td></tr>';
    }
    document.getElementById('feedbackLoading').style.display = 'none';
  };

  window.replyFeedback = async function(id) {
    const reply = prompt('输入回复内容：');
    if (!reply || !reply.trim()) return;
    try {
      const session = (await client.auth.getSession()).data.session;
      if (!session) throw new Error('未登录');
      const req = await fetch((window.__API_BASE||'') + '/api/admin/feedback-reply', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + session.access_token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, reply: reply.trim() })
      });
      const data = await req.json();
      if (!data.ok) throw new Error(data.error || '回复失败');
      toast('已回复', 'success');
      loadAdminFeedbacks();
    } catch(e) {
      toast('回复失败: ' + e.message, 'error');
    }
  };

  init();
})();
</script>
</body>
</html>
